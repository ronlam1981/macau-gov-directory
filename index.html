const CATS=["全部","行政長官","行政會","行政法務司","經濟財政司","保安司","社會文化司","運輸工務司","廉政公署","審計署","立法機關","司法機關","功能組織","諮詢組織","公共事業"];
const COL={"行政長官":"#C41E3A","行政會":"#8B0000","行政法務司":"#1E3A6E","經濟財政司":"#1A7A3A","保安司":"#8B4513","社會文化司":"#6B2D8B","運輸工務司":"#D4790E","廉政公署":"#2E4057","審計署":"#4A6741","立法機關":"#0A6B7C","司法機關":"#333","功能組織":"#6B6B6B","諮詢組織":"#7B6B8D","公共事業":"#0A5E8C"};

function Fld({icon,label,value,href,hl}){
  if(!value)return null;
  const inner=href?<a href={href} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{color:"#1E3A6E",textDecoration:"none",wordBreak:"break-all"}}>{value}</a>:<span style={{color:hl?"#C41E3A":"#333",fontWeight:hl?600:400}}>{value}</span>;
  return <div style={{display:"flex",gap:8,marginBottom:7,fontSize:13,lineHeight:1.6}}><span style={{width:20,textAlign:"center",flexShrink:0}}>{icon}</span><span style={{color:"#999",minWidth:40,flexShrink:0,fontSize:12}}>{label}</span><span style={{flex:1,wordBreak:"break-word"}}>{inner}</span></div>;
}

function Panel({d}){
  const cc=COL[d.c]||"#555";
  const hL=(d.L||[]).length>0;
  return(
    <div style={{padding:"0 16px 16px",borderTop:"1px solid #eee",paddingTop:14}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(250px,1fr))",gap:16}}>
        <div>
          <Fld icon={"\ud83d\udccd"} label={"地址"} value={d.ad}/>
          <Fld icon={"\ud83d\udcde"} label={"電話"} value={d.ph}/>
          {d.fx&&<Fld icon={"\ud83d\udce0"} label={"傳真"} value={d.fx}/>}
          {d.em&&<Fld icon={"\ud83d\udce7"} label={"電郵"} value={d.em} href={"mailto:"+d.em}/>}
          {d.w&&<Fld icon={"\ud83c\udf10"} label={"網站"} value={d.w.replace(/https?:\/\//,"")} href={d.w}/>}
        </div>
        <div>
          <Fld icon={"\ud83d\uddc2"} label={"所屬"} value={d.c}/>
          {hL&&d.L.map((l,i)=><Fld key={i} icon={"\ud83d\udc64"} label={l.r} value={l.p} hl/>)}
        </div>
      </div>
    </div>
  );
}

function App(){
  const [q,setQ]=useState("");
  const [cat,setCat]=useState("全部");
  const [sel,setSel]=useState(null);
  const [fld,setFld]=useState("all");
  const ref=useRef(null);

  const filtered=useMemo(()=>D.filter(d=>{
    if(cat!=="全部"&&d.c!==cat)return false;
    if(!q.trim())return true;
    const s=q.toLowerCase();
    const ld=(d.L||[]).map(l=>l.p+" "+l.r).join(" ").toLowerCase();
    if(fld==="name")return d.n.toLowerCase().includes(s);
    if(fld==="phone")return d.ph.replace(/\s/g,"").includes(s.replace(/\s/g,""));
    if(fld==="email")return d.em.toLowerCase().includes(s);
    if(fld==="leader")return ld.includes(s);
    return(d.n+d.ph+d.em+ld+d.ad).toLowerCase().includes(s);
  }),[q,cat,fld]);

  useEffect(()=>{if(sel!==null&&ref.current)ref.current.scrollIntoView({behavior:"smooth",block:"start"});},[sel]);
  const st=useMemo(()=>{const o={};D.forEach(d=>{o[d.c]=(o[d.c]||0)+1});return o;},[]);

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#f7f5f0,#ebe7df)",fontFamily:"'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif"}}>
      <div style={{background:"linear-gradient(135deg,#0f1923,#243b55)",padding:"28px 20px 24px",color:"#fff"}}>
        <div style={{maxWidth:900,margin:"0 auto"}}>
          <h1 style={{fontSize:20,fontWeight:700,margin:0}}>澳門特區政府部門通訊錄</h1>
          <p style={{fontSize:12,opacity:0.5,margin:"6px 0 0"}}>{D.length} 個部門及機構 · 含 {D.reduce((a,d)=>a+d.L.length,0)} 條領導人資料 · 多維度模糊搜尋</p>
          <p style={{fontSize:11,opacity:0.4,margin:"4px 0 0"}}>資料庫更新日期：2026-03-19</p>
        </div>
      </div>
      <div style={{maxWidth:900,margin:"0 auto",padding:"16px 14px 60px"}}>
        <div style={{background:"#fff",borderRadius:12,padding:"14px 16px",boxShadow:"0 2px 10px rgba(0,0,0,0.05)",marginBottom:14}}>
          <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            {[{v:"all",l:"全部"},{v:"name",l:"名稱"},{v:"phone",l:"電話"},{v:"email",l:"電郵"},{v:"leader",l:"領導"}].map(f=>
              <button key={f.v} onClick={()=>setFld(f.v)} style={{padding:"4px 12px",borderRadius:16,border:"none",cursor:"pointer",fontSize:11,fontWeight:fld===f.v?600:400,background:fld===f.v?"#1a2a40":"#f0ede8",color:fld===f.v?"#fff":"#666"}}>{f.l}</button>
            )}
          </div>
          <input type="text" value={q} onChange={e=>setQ(e.target.value)} placeholder={"搜尋部門名稱、電話、電郵或領導人姓名（支援模糊搜尋）..."}
            style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"1.5px solid #ddd",fontSize:14,outline:"none",background:"#fafaf8",boxSizing:"border-box"}}/>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14}}>
          {CATS.map(c=>{
            const a=cat===c;
            return <button key={c} onClick={()=>{setCat(c);setSel(null);}} style={{padding:"5px 12px",borderRadius:16,border:"none",cursor:"pointer",fontSize:11,fontWeight:a?600:400,background:a?(COL[c]||"#1a2a40"):"#fff",color:a?"#fff":"#777",boxShadow:a?"0 2px 8px rgba(0,0,0,0.12)":"0 1px 3px rgba(0,0,0,0.05)"}}>{c} ({c==="全部"?D.length:(st[c]||0)})</button>;
          })}
        </div>
        <div style={{fontSize:12,color:"#999",marginBottom:10}}>找到 <strong style={{color:"#333"}}>{filtered.length}</strong> 個部門/機構</div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {filtered.map((d,idx)=>{
            const oi=D.indexOf(d);
            const o=sel===oi;
            const cc=COL[d.c]||"#555";
            return(
              <div key={oi} ref={o?ref:null} onClick={()=>setSel(o?null:oi)} style={{background:"#fff",borderRadius:10,overflow:"hidden",cursor:"pointer",border:o?"2px solid "+cc:"1px solid rgba(0,0,0,0.06)",boxShadow:o?"0 4px 16px rgba(0,0,0,0.08)":"0 1px 3px rgba(0,0,0,0.03)"}}>
                <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:6,height:40,borderRadius:3,flexShrink:0,background:cc}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:600,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.n}</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                      <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:cc+"15",color:cc}}>{d.c}</span>
                      {(d.L||[]).map((l,li)=><span key={li} style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:"#C41E3A15",color:"#C41E3A"}}>{"\ud83d\udc64 "+l.r+"\uff1a"+l.p}</span>)}
                    </div>
                  </div>
                  <div style={{fontSize:16,color:"#ccc",transform:o?"rotate(180deg)":"rotate(0)",transition:"transform 0.3s"}}>{"\u25BE"}</div>
                </div>
                {o&&<Panel d={d}/>}
              </div>
            );
          })}
        </div>
        {filtered.length===0&&<div style={{textAlign:"center",padding:50,color:"#aaa"}}><div style={{fontSize:44,marginBottom:10}}>{"\ud83d\udd0d"}</div><div>未找到相關部門或人員</div></div>}
        <div style={{textAlign:"center",marginTop:32,padding:"16px 0",borderTop:"1px solid #ddd",color:"#bbb",fontSize:10,lineHeight:1.8}}>
          資料來源：澳門特別行政區政府入口網站 gov.mo<br/>
          <span style={{color:"#C41E3A"}}>{"\u25cf"}</span> 含領導人資料　可按名稱、電話、電郵、領導人姓名模糊搜尋
          <div style={{marginTop:14}}>
            <button onClick={(e)=>{e.preventDefault();const dir=location.href.replace(/\/[^/]*$/,'').replace('file://','').replace(/%20/g,' ');navigator.clipboard.writeText('open "'+dir+'/updatedata.command"').then(()=>{const b=e.target;b.textContent='\u2705 指令已複製到剪貼板，請在終端機貼上執行';b.style.background='#4CAF50';b.style.color='#fff';setTimeout(()=>{b.textContent='\ud83d\udd04 檢查 gov.mo 最新資料並更新';b.style.background='#f0ede8';b.style.color='#888';},3000)});}} style={{padding:"8px 20px",borderRadius:20,border:"1px solid #ddd",cursor:"pointer",fontSize:11,background:"#f0ede8",color:"#888"}}>{"\ud83d\udd04 檢查 gov.mo 最新資料並更新"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
